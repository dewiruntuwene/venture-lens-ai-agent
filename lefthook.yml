pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,js,json,md}'
      run: prettier --write {staged_files} && git add {staged_files}
    type-check:
      glob: '*.{ts}'
      run: bun run type-check

pre-push:
  commands:
    format-check:
      run: bun run format:check
    type-check:
      run: bun run type-check
